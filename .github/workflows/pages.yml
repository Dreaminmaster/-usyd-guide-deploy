name: Deploy USYD Guide

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html site.html.gz.b64 _site/
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Record successful deployment
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          DEPLOYED_SHA: ${{ github.sha }}
        run: |
          rm -rf _site
          {
            echo '# GitHub Pages deployment'
            echo
            echo '- Status: successful'
            echo "- URL: ${PAGE_URL}"
            echo "- Source commit: ${DEPLOYED_SHA}"
            echo "- Deployed at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } > DEPLOYMENT_STATUS.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add DEPLOYMENT_STATUS.md
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'Record successful Pages deployment [skip ci]'
          git push
