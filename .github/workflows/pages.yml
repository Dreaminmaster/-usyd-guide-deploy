name: Deploy USYD Bible

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rebuild and verify final site
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          rm -rf _site
          mkdir -p _site
          python3 scripts/verify_payload.py --output _site/index.html 2>&1 | tee /tmp/payload-verification.log
          cp content-manifest.json _site/
          touch _site/.nojekyll

      - name: Record verification failure
        if: steps.build.outcome != 'success'
        run: |
          git pull --rebase origin main
          {
            echo '# USYD Bible build verification'
            echo
            echo '- Status: failed'
            echo "- Source commit: ${{ github.sha }}"
            echo "- Checked at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo
            echo '```text'
            cat /tmp/payload-verification.log
            echo '```'
          } > BUILD_STATUS.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add BUILD_STATUS.md
          git commit -m 'Record failed USYD Bible verification [skip ci]' || true
          git push
          exit 1

      - name: Configure GitHub Pages
        if: steps.build.outcome == 'success'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        if: steps.build.outcome == 'success'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Record successful deployment
        if: steps.build.outcome == 'success'
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          DEPLOYED_SHA: ${{ github.sha }}
        run: |
          git pull --rebase origin main
          rm -f BUILD_STATUS.md
          {
            echo '# GitHub Pages deployment'
            echo
            echo '- Status: successful'
            echo '- Edition: source-labelled-redesign-2026'
            echo "- URL: ${PAGE_URL}"
            echo "- Source commit: ${DEPLOYED_SHA}"
            echo '- Content SHA-256: 5cdacc4e0193b85ee7e8f809000bb3791b681e3dd5dfcbff8886fbabbe140b31'
            echo '- Assets: readable provenance CSS and JavaScript verified separately'
            echo '- Entries: 423 searchable topics / 280 guides / 51 FAQs / 92 checklist items / 50 original sources'
            echo "- Deployed at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } > DEPLOYMENT_STATUS.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A BUILD_STATUS.md DEPLOYMENT_STATUS.md
          git commit -m 'Record source-labelled USYD Bible deployment [skip ci]' || true
          git push
