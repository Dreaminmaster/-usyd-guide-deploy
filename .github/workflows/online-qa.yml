name: Verify live USYD Bible

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: online-qa
  cancel-in-progress: true

jobs:
  verify-live-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify public Pages response
        id: live
        continue-on-error: true
        run: |
          python3 - <<'PY' 2>&1 | tee /tmp/online-qa.log
          import hashlib,time,urllib.request
          root='https://dreaminmaster.github.io/-usyd-guide-deploy/'
          targets={
              'index.html':(333239,'5cdacc4e0193b85ee7e8f809000bb3791b681e3dd5dfcbff8886fbabbe140b31'),
              'assets/source-labels.css':(3220,'e785547a0bf5faef6a18551fc8b807c48f4b124ea172cdb1822490f782e138bd'),
              'assets/source-labels.js':(15994,'2f42e968eba1ef50ff616ab563d1c17b13dd4076b38c4d55c8defddb89745bcf'),
          }
          last=None
          for attempt in range(1,19):
              try:
                  bodies={}
                  for path,(expected_bytes,expected_sha) in targets.items():
                      url=root if path=='index.html' else root+path
                      request=urllib.request.Request(url,headers={'User-Agent':'USYD-Bible-QA/3.0','Cache-Control':'no-cache'})
                      with urllib.request.urlopen(request,timeout=30) as response:
                          body=response.read(); status=response.status
                      digest=hashlib.sha256(body).hexdigest()
                      print(f'attempt={attempt} path={path} status={status} bytes={len(body)} sha256={digest}')
                      if status!=200 or len(body)!=expected_bytes or digest!=expected_sha:
                          raise RuntimeError(f'unexpected {path}: status={status} bytes={len(body)} sha256={digest}')
                      bodies[path]=body
                  html=bodies['index.html'].decode('utf-8')
                  script=bodies['assets/source-labels.js'].decode('utf-8')
                  for marker in ('assets/source-labels.css','assets/source-labels.js','找到官方答案','数字学生证加入 Apple Wallet'):
                      assert marker in html, marker
                  for marker in ('内容留在本站，来源清楚标注','官方事实','官方系统路径','学生经验','编辑整理','展开原始页面链接','第六步：手机丢失或被盗时'):
                      assert marker in script, marker
                  print('LIVE_QA_SUCCESS')
                  break
              except Exception as error:
                  last=repr(error)
                  print(f'attempt={attempt} error={last}')
              time.sleep(10)
          else:
              raise RuntimeError(last or 'live verification failed')
          PY

      - name: Record online QA
        if: always()
        run: |
          git pull --rebase origin main
          {
            echo '# Online release QA'
            echo
            if [ '${{ steps.live.outcome }}' = 'success' ]; then
              echo '- Status: successful'
            else
              echo '- Status: failed'
            fi
            echo '- Edition: source-labelled-redesign-2026'
            echo '- URL: https://dreaminmaster.github.io/-usyd-guide-deploy/'
            echo '- Expected HTML bytes: 333239'
            echo '- Expected HTML SHA-256: 5cdacc4e0193b85ee7e8f809000bb3791b681e3dd5dfcbff8886fbabbe140b31'
            echo '- Verified assets: source-labels.css and source-labels.js'
            echo "- Checked at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo
            echo '```text'
            cat /tmp/online-qa.log
            echo '```'
          } > ONLINE_QA.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add ONLINE_QA.md
          git commit -m 'Record online source-labelled USYD Bible QA [skip ci]' || true
          git push
          test '${{ steps.live.outcome }}' = 'success'
